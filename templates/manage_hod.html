{% extends 'base.html' %}
{% block content %}
<div class="grid grid-cols-2" style="gap: 2rem; align-items: flex-start;">
    
    <div class="glass-panel">
        <h2><i class="fa-solid fa-user-plus"></i> Add HOD</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Create a new Head of Department account.</p>
        
        <form method="POST" action="{{ url_for('manage_hod') }}">
            <input type="hidden" name="action" value="add">
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="hod_cse">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Secure Password">
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <select id="department" name="department" class="form-control" required>
                    <option value="">-- Select Department --</option>
                    {% for dept in departments %}
                    <option value="{{ dept }}">{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-plus"></i> Create HOD Account
            </button>
        </form>
    </div>

    <div class="glass-panel">
        <h2><i class="fa-solid fa-users-gear"></i> Existing HODs</h2>
        <div class="table-container" style="margin-top: 1.5rem;">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for hod in hod_members %}
                    <tr>
                        <td><strong>{{ hod.username }}</strong></td>
                        <td><span class="badge" style="background: rgba(139, 92, 246, 0.2); color: #c4b5fd;">{{ hod.department }}</span></td>
                        <td style="display: flex; gap: 0.5rem;">
                            <button type="button" class="btn btn-primary" style="padding: 0.5rem 1rem; background-color: var(--accent-color);" title="Edit HOD" onclick="openHODModal({{ hod.id }}, '{{ hod.username|replace("'", "\\'") }}', '{{ hod.department|replace("'", "\\'") }}')">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form method="POST" action="{{ url_for('manage_hod') }}" onsubmit="return confirm('Are you sure you want to delete this HOD?');" style="margin: 0;">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="user_id" value="{{ hod.id }}">
                                <button type="submit" class="btn btn-primary" style="background-color: var(--danger); padding: 0.5rem 1rem;">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" style="text-align: center; color: var(--text-secondary);">No HODs found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit HOD Modal -->
<div id="editHODModal" class="modal" onclick="if(event.target===this) closeHODModal()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeHODModal()"><i class="fa-solid fa-xmark"></i></button>
    <h3 style="margin-top:0; margin-bottom:1.4rem;"><i class="fa-solid fa-pen-to-square"></i> Edit HOD</h3>
    
    <form method="POST" action="{{ url_for('manage_hod') }}">
        <input type="hidden" name="action" value="update">
        <input type="hidden" id="edit_hod_id" name="user_id" value="">
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="edit_hod_username" name="username" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select id="edit_hod_department" name="department" class="form-control" required>
                {% for dept in departments %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>New Password <span style="color:var(--text-secondary); font-size:0.8em;">(leave blank to keep current)</span></label>
            <input type="password" name="password" class="form-control" placeholder="...">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
            <i class="fa-solid fa-floppy-disk"></i> Update Credentials
        </button>
    </form>
  </div>
</div>

<script>
function openHODModal(id, username, dept) {
    document.getElementById('edit_hod_id').value = id;
    document.getElementById('edit_hod_username').value = username;
    document.getElementById('edit_hod_department').value = dept;
    document.getElementById('editHODModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeHODModal() {
    document.getElementById('editHODModal').classList.remove('open');
    document.body.style.overflow = '';
}
</script>
{% endblock %}
