{% extends 'base.html' %}
{% block content %}
<div class="glass-panel" style="margin-bottom: 2rem;">
    <h2><i class="fa-solid fa-clock"></i> Timetable Matrix Generator</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Configure the grid parameters to generate a full Multi-Day schedule.</p>
    
    <form method="POST" action="{{ url_for('timetable_admin') }}">
        <input type="hidden" name="action" value="generate">
        <div class="grid grid-cols-5" style="align-items: end; gap: 1rem;">
            <div class="form-group" style="margin-bottom: 0;">
                <label>Number of Days</label>
                <input type="number" name="total_days" class="form-control" value="{{ config.total_days or 5 }}" min="1">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Total Academic Periods</label>
                <input type="number" name="total_periods" class="form-control" value="{{ config.total_periods }}" min="1">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Break After Period #</label>
                <input type="number" name="break_after" class="form-control" value="{{ config.break_after }}" min="1">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Lunch After Period #</label>
                <input type="number" name="lunch_after" class="form-control" value="{{ config.lunch_after }}" min="1">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-table"></i> Generate Grid
                </button>
            </div>
        </div>
    </form>
</div>

<!-- Layout Editor Matrix-->
<div class="glass-panel" id="layoutPreviewPanel" style="display: none; overflow-x: auto;">
    <div class="flex-between">
        <h3><i class="fa-solid fa-layer-group"></i> Master Schedule Editor</h3>
        <button type="button" class="btn btn-primary" style="background-color: var(--success);" onclick="document.getElementById('saveNamesForm').submit()">
            <i class="fa-solid fa-floppy-disk"></i> Save Timetable Matrix
        </button>
    </div>
    <p style="color: var(--text-secondary); margin-top: -1rem; margin-bottom: 1.5rem; font-size: 0.875rem;">Modify the <strong>Day Names</strong> and fill in the <strong>Subjects</strong> in the empty cells. Empty boxes default to "—".</p>

    <form id="saveNamesForm" method="POST" action="{{ url_for('timetable_admin') }}">
        <input type="hidden" name="action" value="save_names">
        <input type="hidden" id="layout_data_input" name="layout_data" value="">
    </form>
    
    <div class="table-container" style="margin-top: 1.5rem;">
        <table id="matrixTable" style="min-width: 800px; text-align: center;">
            <thead id="matrixHead">
                <!-- JS Inject -->
            </thead>
            <tbody id="matrixBody">
                <!-- JS inject -->
            </tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const totalDays = {{ config.total_days|default(5) }};
    const totalPeriods = {{ config.total_periods|default(6) }};
    const breakAfter = {{ config.break_after|default(2) }};
    const lunchAfter = {{ config.lunch_after|default(4) }};
    
    let rawStr = `{{ config.layout_data|default('{}')|safe }}`;
    let layout = { columns: [], grid: [] };
    
    if (rawStr && rawStr.trim() !== 'None' && rawStr.trim() !== '') {
        try { layout = JSON.parse(rawStr); } catch(e) {}
    }
    
    // If empty or shape entirely mismatching, rebuild columns
    if (!layout.columns || layout.columns.length === 0) {
        let academicCount = 1;
        while(academicCount <= totalPeriods) {
            layout.columns.push({ id: 'p_'+academicCount, name: 'Period ' + academicCount, type: 'academic' });
            
            if (academicCount === breakAfter) {
                layout.columns.push({ id: 'b', name: 'Short Break', type: 'break' });
            }
            if (academicCount === lunchAfter) {
                layout.columns.push({ id: 'l', name: 'Lunch', type: 'lunch' });
            }
            academicCount++;
        }
        
        // Setup empty grid rows
        for(let d = 1; d <= totalDays; d++) {
            let defaultDayName = Object.values({1:"Monday", 2:"Tuesday", 3:"Wednesday", 4:"Thursday", 5:"Friday", 6:"Saturday", 7:"Sunday"})[((d-1)%7) + 1] || "Day " + d;
            let cells = [];
            for(let c = 0; c < layout.columns.length; c++) {
                cells.push("");
            }
            layout.grid.push({ day_name: "Day " + d + " - " + defaultDayName, cells: cells });
        }
    }
    
    if(layout.columns && layout.columns.length > 0) {
        document.getElementById('layoutPreviewPanel').style.display = 'block';
        
        // Construct Header row
        const thead = document.getElementById('matrixHead');
        let trHead = document.createElement('tr');
        trHead.innerHTML = `<th style="width: 15%; background: rgba(255,255,255,0.05);">Serial / Date</th>`;
        layout.columns.forEach((col, cIdx) => {
            let color = 'inherit';
            if(col.type === 'break') color = '#f59e0b';
            if(col.type === 'lunch') color = 'var(--accent-color)';
            trHead.innerHTML += `
               <th style="color: ${color}; text-align: center;">
                 <input type="text" value="${col.name}" class="form-control" style="background:transparent; border:none; text-align:center; padding:0; font-weight:bold; color:inherit; width: 100px;" onchange="updateColumn(${cIdx}, this.value)">
               </th>`;
        });
        thead.appendChild(trHead);
        
        // Construct Body rows
        const tbody = document.getElementById('matrixBody');
        layout.grid.forEach((row, rIdx) => {
            let trHtml = `
                <td style="background: rgba(255,255,255,0.02); font-weight: 600;">
                   <input type="text" value="${row.day_name}" class="form-control" style="background:transparent; border:none; font-weight:bold; color:var(--text-primary); padding:0; width: 100%;" onchange="updateRowName(${rIdx}, this.value)">
                </td>`;
            
            layout.columns.forEach((col, cIdx) => {
                let cellVal = row.cells[cIdx] || "";
                if (col.type !== 'academic') {
                    // Span or disabled look for break/lunch cells
                    trHtml += `<td style="background: rgba(255,255,255,0.02);"><span style="color: var(--text-secondary); opacity: 0.5;">—</span></td>`;
                } else {
                    trHtml += `<td>
                       <input type="text" value="${cellVal}" class="form-control" placeholder="Subject..." style="width: 100%; border: 1px solid var(--glass-border);" onchange="updateCell(${rIdx}, ${cIdx}, this.value)">
                    </td>`;
                }
            });
            let trNode = document.createElement('tr');
            trNode.innerHTML = trHtml;
            tbody.appendChild(trNode);
        });
        
        document.getElementById('layout_data_input').value = JSON.stringify(layout);
    }
});

function updateColumn(cIdx, val) {
    let layout = JSON.parse(document.getElementById('layout_data_input').value);
    layout.columns[cIdx].name = val;
    document.getElementById('layout_data_input').value = JSON.stringify(layout);
}

function updateRowName(rIdx, val) {
    let layout = JSON.parse(document.getElementById('layout_data_input').value);
    layout.grid[rIdx].day_name = val;
    document.getElementById('layout_data_input').value = JSON.stringify(layout);
}

function updateCell(rIdx, cIdx, val) {
    let layout = JSON.parse(document.getElementById('layout_data_input').value);
    layout.grid[rIdx].cells[cIdx] = val;
    document.getElementById('layout_data_input').value = JSON.stringify(layout);
}
</script>
{% endblock %}
