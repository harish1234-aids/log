{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - var(--navbar-h) - 4rem); padding: 1rem 0;">
    <div class="glass-panel" style="width: 100%; max-width: 400px; margin: auto;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-lock" style="font-size: 3rem; color: var(--accent-color); margin-bottom: 1rem;"></i>
            <h2 class="title-underline" style="display: inline-block;">Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-top: 1rem;">Sign in to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" class="form-control" required
                       placeholder="Enter your username" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-key"></i> Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                       placeholder="Enter your password" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; color: #ffffff;">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
