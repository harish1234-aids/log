{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; padding: 2rem 0;">
    <div class="glass-panel" style="width: 100%; max-width: 500px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-plus" style="font-size: 3rem; color: var(--accent-color); margin-bottom: 1rem;"></i>
            <h2 class="title-underline" style="display: inline-block;">Add New Student</h2>
            <p style="color: var(--text-secondary); margin-top: 1rem;">Create a student profile and login credentials</p>
        </div>

        <form method="POST" action="{{ url_for('add_student') }}">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="Alice Smith">
            </div>

            <div class="grid grid-cols-2" style="gap: 1rem;">
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" class="form-control" required placeholder="Computer Science">
                </div>
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" name="year" class="form-control" required placeholder="1" min="1" max="5">
                </div>
            </div>

            <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 1.5rem 0;">
            <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.875rem;">Account Credentials</p>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="alice_smith">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Secure Password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-plus"></i> Create Student Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
