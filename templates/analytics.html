{% extends 'base.html' %}
{% block content %}
<div class="glass-panel" style="margin-bottom: 2rem;">
    <div class="flex-between">
        <h2><i class="fa-solid fa-chart-line"></i> Advanced Institution Analytics</h2>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <button id="backBtn" class="btn btn-secondary" style="display: none;" onclick="goBack()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <button class="btn btn-primary" onclick="loadLevel(1)">
                <i class="fa-solid fa-rotate-right"></i> Reset
            </button>
        </div>
    </div>
    <p id="breadCrumbs" style="color: var(--text-secondary); margin-top: 0.5rem; font-weight: 500;">Institution Overview</p>
</div>

<div id="filterPanel" class="glass-panel" style="margin-bottom: 2rem;">
    <div class="grid grid-cols-2" style="gap: 1.5rem; align-items: center;">
        <div style="display: flex; gap: 1rem; align-items: center;">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--accent-color);"></i>
            <input type="text" id="studentSearch" class="form-control" placeholder="Search for a student..." oninput="debounceSearch()">
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <i class="fa-solid fa-filter" style="color: #f59e0b;"></i>
            <select id="examFilter" class="form-control" onchange="loadLevel(currentLevel)">
                <option value="All">All Exams (Average)</option>
                <option value="Internal 1">Internal 1</option>
                <option value="Internal 2">Internal 2</option>
                <option value="Model Exam">Model Exam</option>
                <option value="Assignment">Assignment</option>
                <option value="Semester">Semester</option>
            </select>
        </div>
        {% if current_user.role in ['hod', 'staff', 'principal'] %}
        <div style="display: flex; gap: 1rem; align-items: center;">
            <i class="fa-solid fa-calendar-days" style="color: var(--accent-color);"></i>
            <select id="yearFilter" class="form-control" onchange="loadLevel(currentLevel)">
                <option value="">All Years</option>
                {% for y in years %}
                <option value="{{ y }}">Year {{ y }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
    </div>
</div>

<div class="grid grid-cols-2" id="chartGrid" style="gap: 2rem;">
    <div class="glass-panel">
        <h3 id="marksTitle" style="margin-bottom: 1.5rem;"><i class="fa-solid fa-graduation-cap"></i> Performance Averages (%)</h3>
        <canvas id="marksChart" style="max-height: 400px;"></canvas>
    </div>
    <div class="glass-panel">
        <h3 id="attendanceTitle" style="margin-bottom: 1.5rem;"><i class="fa-solid fa-user-check"></i> Attendance Averages (%)</h3>
        <canvas id="attendanceChart" style="max-height: 400px;"></canvas>
    </div>
</div>

<div id="studentDetailGrid" class="grid grid-cols-2" style="margin-top: 2rem; display: none; gap: 2rem;">
    <!-- Student individual cards will be injected here -->
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let currentLevel = 1;
    let currentDept = '';
    let currentYear = '';
    let currentSubject = '';
    let marksChart = null;
    let attendanceChart = null;
    let searchTimeout = null;

    Chart.defaults.color = 'rgba(255,255,255,0.7)';
    Chart.defaults.font.family = "'Outfit', sans-serif";

    document.addEventListener("DOMContentLoaded", function() {
        loadLevel(1);
    });

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            loadLevel(currentLevel, { search: document.getElementById('studentSearch').value });
        }, 500);
    }

    function loadLevel(level, params = {}) {
        currentLevel = level;
        const search = params.search || document.getElementById('studentSearch').value;
        const exam = document.getElementById('examFilter').value;
        const yearFilterElem = document.getElementById('yearFilter');
        const selectedYear = yearFilterElem ? yearFilterElem.value : '';
        
        let url = `/api/analytics?level=${level}&search=${encodeURIComponent(search)}&exam=${encodeURIComponent(exam)}`;
        if (currentDept) url += `&dept=${encodeURIComponent(currentDept)}`;
        if (selectedYear) url += `&year=${selectedYear}`;
        else if (currentYear) url += `&year=${currentYear}`;
        if (currentSubject) url += `&subject=${encodeURIComponent(currentSubject)}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                updateUI(data);
            });
    }

    function updateUI(data) {
        const bread = document.getElementById('breadCrumbs');
        const backBtn = document.getElementById('backBtn');
        const studentGrid = document.getElementById('studentDetailGrid');
        const chartGrid = document.getElementById('chartGrid');

        backBtn.style.display = currentLevel > 1 ? 'block' : 'none';
        
        if (currentLevel === 1) bread.innerText = "Institution Overview";
        else if (currentLevel === 2) bread.innerText = `Department: ${currentDept}`;
        else if (currentLevel === 3) bread.innerText = `Department: ${currentDept} > Year ${currentYear}`;

        if (data.students && data.students.length > 0) {
            chartGrid.style.display = 'none';
            studentGrid.style.display = 'grid';
            renderStudentCards(data.students);
        } else {
            chartGrid.style.display = 'grid';
            studentGrid.style.display = 'none';
            renderCharts(data);
        }
    }

    function renderCharts(data) {
        // Marks Chart
        const ctxMarks = document.getElementById('marksChart').getContext('2d');
        if (marksChart) marksChart.destroy();
        marksChart = createChart(ctxMarks, 'Avg Marks %', data.labels, data.marks, 'rgba(59, 130, 246, 0.7)', 'rgb(59, 130, 246)');

        // Attendance Chart
        const ctxAtt = document.getElementById('attendanceChart').getContext('2d');
        if (attendanceChart) attendanceChart.destroy();
        attendanceChart = createChart(ctxAtt, 'Avg Attendance %', data.labels, data.attendance, 'rgba(16, 185, 129, 0.7)', 'rgb(16, 185, 129)');
    }

    function createChart(ctx, label, labels, dataPoints, bgColor, borderColor) {
        return new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: dataPoints,
                    backgroundColor: bgColor,
                    borderColor: borderColor,
                    borderWidth: 1,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                onClick: (evt, elements) => {
                    if (elements.length > 0) {
                        const index = elements[0].index;
                        handleDrillDown(labels[index]);
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' }
                    },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    function renderStudentCards(students) {
        const grid = document.getElementById('studentDetailGrid');
        grid.innerHTML = '';

        students.forEach(s => {
            const card = document.createElement('div');
            card.className = 'glass-panel';
            card.style.padding = '1.5rem';
            
            let marksHtml = s.marks_data.map(m => `
                <div style="margin-bottom: 0.5rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:0.2rem;">
                        <span>${m.subject}</span>
                        <span style="font-weight:600;">${m.avg}%</span>
                    </div>
                    <div style="height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;">
                        <div style="height:100%; width:${m.avg}%; background:${m.avg >= 50 ? 'var(--success)' : 'var(--danger)'};"></div>
                    </div>
                </div>
            `).join('');

            card.innerHTML = `
                <h4 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                    <i class="fa-solid fa-user-graduate"></i> ${s.name}
                </h4>
                <div style="margin-bottom: 1.5rem;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Attendance Score</p>
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <div style="flex-grow:1; height:10px; background:rgba(255,255,255,0.1); border-radius:5px; overflow:hidden;">
                            <div style="height:100%; width:${s.attendance_pct}%; background:var(--accent-color);"></div>
                        </div>
                        <span style="font-weight:700;">${s.attendance_pct}%</span>
                    </div>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Subject Performance</p>
                ${marksHtml}
            `;
            grid.appendChild(card);
        });
    }

    function handleDrillDown(label) {
        const role = "{{ current_user.role }}";
        if (currentLevel === 1) {
            if (role === 'principal') {
                currentDept = label;
                loadLevel(2);
            } else if (role === 'hod') {
                currentSubject = label;
                loadLevel(2);
            } else if (role === 'staff') {
                const match = label.match(/\((.*) Y(\d)\)/);
                if (match) {
                    currentDept = match[1];
                    currentYear = match[2];
                    loadLevel(2);
                }
            }
        } else if (currentLevel === 2) {
            if (role === 'principal') {
                currentYear = label.replace('Year ', '');
                loadLevel(3);
            }
        }
    }

    function goBack() {
        if (currentLevel === 3) {
            currentYear = '';
            loadLevel(2);
        } else if (currentLevel === 2) {
            currentDept = '';
            currentSubject = '';
            loadLevel(1);
        }
    }
</script>

<style>
    .glass-panel:hover {
        border-color: var(--accent-color);
        transition: border-color 0.3s;
    }
    #mainChart { cursor: pointer; }
</style>
{% endblock %}
